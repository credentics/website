limit_req_zone $binary_remote_addr zone=credentics_contact:10m rate=6r/m;

server {
    server_name credentics.io www.credentics.io;

    root /var/www/credentics/dist;
    index index.html;

    location = /docs {
        return 301 /docs/;
    }

    location /docs/ {
        alias /var/www/credentics-docs/dist/;
        try_files $uri $uri/ $uri.html =404;
    }

    location = /api/connect {
        limit_req zone=credentics_contact burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 12k;

        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location / {
        proxy_intercept_errors on;
        error_page 502 503 504 = @static_fallback;

        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @static_fallback {
        try_files $uri.html $uri/index.html $uri =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/credentics.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/credentics.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.credentics.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = credentics.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name credentics.io www.credentics.io;
    return 404; # managed by Certbot
}
